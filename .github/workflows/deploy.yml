name: Deploy Quartz site

on:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - "site/**"
      - "memory/**"
      - ".github/workflows/deploy.yml"
  schedule:
    # Weekly redeploy every Sunday at 03:17 UTC — keeps site fresh even without wiki changes
    - cron: "17 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wiki
        uses: actions/checkout@v5

      - name: Validate wiki catalog and lint gates
        run: |
          python scripts/wiki-catalog.py --root .
          python - <<'PY'
          import sys
          from pathlib import Path

          sys.path.insert(0, "scripts")
          from wiki_core import lint_wiki

          report = lint_wiki(Path(".").resolve())
          fatal_keys = [
              "broken_links",
              "ambiguous_links",
              "missing_from_index",
              "private_leaks",
          ]
          failed = False
          for key in fatal_keys:
              items = report.get(key, [])
              if items:
                  failed = True
                  print(f"::error title={key}::{len(items)} issue(s)")
                  for item in items:
                      print(f"- {item}")
          if report.get("catalog_status") != "fresh":
              failed = True
              print(f"::error title=catalog_status::{report.get('catalog_status')}")
          if failed:
              raise SystemExit(1)
          print("Wiki validation passed.")
          PY

      - name: Checkout Quartz
        uses: actions/checkout@v5
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: .quartz-build

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .quartz-build/package-lock.json

      - name: Install Quartz dependencies
        run: npm ci
        working-directory: .quartz-build

      - name: Sync public wiki content
        run: node site/sync-content.mjs .quartz-build/content

      - name: Apply site configuration
        run: |
          cp site/quartz.config.ts .quartz-build/quartz.config.ts
          cp site/quartz.layout.ts .quartz-build/quartz.layout.ts
          cp site/custom.scss .quartz-build/quartz/styles/custom.scss

      - name: Build Quartz
        run: npx quartz build -d content -o public
        working-directory: .quartz-build

      - name: Verify Quartz artifact
        run: |
          test -f .quartz-build/public/index.html
          grep -q 'id="quartz-root"' .quartz-build/public/index.html
          grep -q 'Command Center' .quartz-build/public/index.html
          if grep -q 'Operating Contract' .quartz-build/public/index.html; then
            echo "Built artifact looks like the repository README, not the Quartz wiki home." >&2
            exit 1
          fi

      - name: Check public/private boundary
        run: |
          if grep -R -n -E "wiki-private|raw/private" .quartz-build/public; then
            echo "Public site contains private/raw path references." >&2
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .quartz-build/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify deployed site
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          for i in {1..12}; do
            curl -LfsS "${url}?deploy-check=${GITHUB_RUN_ID}-${i}" -o /tmp/site.html || true
            if grep -q 'id="quartz-root"' /tmp/site.html && grep -q 'Command Center' /tmp/site.html; then
              echo "Verified Quartz wiki home at ${url}"
              exit 0
            fi
            sleep 10
          done
          echo "Deployed site did not serve the Quartz wiki home." >&2
          echo "First headings seen:" >&2
          grep -oE '<h[12][^>]*>[^<]+' /tmp/site.html | head -10 >&2 || true
          exit 1
