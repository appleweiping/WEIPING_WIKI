name: Deploy Quartz site

on:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.detect-pages.outputs.enabled }}
    steps:
      - name: Checkout wiki
        uses: actions/checkout@v5

      - name: Validate wiki catalog and lint gates
        run: |
          python scripts/wiki-catalog.py --root .
          python - <<'PY'
          import sys
          from pathlib import Path

          sys.path.insert(0, "scripts")
          from wiki_core import lint_wiki

          report = lint_wiki(Path(".").resolve())
          fatal_keys = [
              "broken_links",
              "ambiguous_links",
              "missing_from_index",
              "private_leaks",
          ]
          failed = False
          for key in fatal_keys:
              items = report.get(key, [])
              if items:
                  failed = True
                  print(f"::error title={key}::{len(items)} issue(s)")
                  for item in items:
                      print(f"- {item}")
          if report.get("catalog_status") != "fresh":
              failed = True
              print(f"::error title=catalog_status::{report.get('catalog_status')}")
          if failed:
              raise SystemExit(1)
          print("Wiki validation passed.")
          PY

      - name: Checkout Quartz
        uses: actions/checkout@v5
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: .quartz-build

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .quartz-build/package-lock.json

      - name: Install Quartz dependencies
        run: npm ci
        working-directory: .quartz-build

      - name: Sync public wiki content
        run: node site/sync-content.mjs .quartz-build/content

      - name: Apply site configuration
        run: |
          cp site/quartz.config.ts .quartz-build/quartz.config.ts
          cp site/quartz.layout.ts .quartz-build/quartz.layout.ts

      - name: Build Quartz
        run: npx quartz build -d content -o public
        working-directory: .quartz-build

      - name: Check public/private boundary
        run: |
          if grep -R -n -E "wiki-private|raw/private" .quartz-build/public; then
            echo "Public site contains private/raw path references." >&2
            exit 1
          fi

      - name: Detect Pages configuration
        id: detect-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status="$(curl -L -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")"

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled; deployment will run."
          elif [ "$status" = "404" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GitHub Pages is not enabled for this repository. Build validation passed, deployment will be skipped."
          else
            echo "Could not determine GitHub Pages status. API status: $status" >&2
            cat /tmp/pages.json >&2
            exit 1
          fi

      - name: Setup Pages
        if: steps.detect-pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: steps.detect-pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: .quartz-build/public

  deploy:
    if: needs.build.outputs.pages_enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
